name: Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(grep -oP '<Version>\K[^<]+' src/Sendspin.SDK/Sendspin.SDK.csproj)
          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            SHORT_SHA=${GITHUB_SHA::7}
            VERSION="${BASE_VERSION}-dev.${SHORT_SHA}"
          else
            VERSION="${BASE_VERSION}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Pack
        if: github.event_name == 'push'
        run: dotnet pack src/Sendspin.SDK/Sendspin.SDK.csproj -c Release --no-build -o artifacts -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Upload NuGet package
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

  publish:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      packages: write

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: artifacts

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push "artifacts/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/Sendspin/index.json --skip-duplicate
